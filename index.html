<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE Rankings · PickleBee by 71</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9efe9;--surface:#f4f8f3;--surface-2:#eef3ed;
  --lime:#a8d600;--lime-deep:#8bb800;--pink:#ff2e9a;--cyan:#12cccc;
  --ink:#1c2a1f;--muted:#6b7d6e;
  --clay:7px 7px 18px rgba(60,80,55,.18),-7px -7px 16px rgba(255,255,255,.9);
  --clay-in:inset 4px 4px 9px rgba(60,80,55,.16),inset -4px -4px 9px rgba(255,255,255,.85);
  --clay-sm:4px 4px 11px rgba(60,80,55,.16),-4px -4px 10px rgba(255,255,255,.85);
  --r:24px;--r-sm:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;color:var(--ink);padding:24px 16px 60px;min-height:100vh;
  background:radial-gradient(circle at 10% 6%,rgba(168,214,0,.10),transparent 40%),
  radial-gradient(circle at 92% 96%,rgba(18,204,204,.10),transparent 42%),var(--bg);
  -webkit-font-smoothing:antialiased;}
.wrap{max-width:1200px;margin:0 auto;}
header{text-align:center;margin-bottom:28px;}
.logo{width:92px;height:92px;object-fit:contain;background:var(--surface);border-radius:50%;
  box-shadow:var(--clay);padding:12px;margin:0 auto 14px;display:block;}
.eyebrow{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.5px;color:var(--cyan);
  text-transform:uppercase;font-size:.8rem;}
h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.8rem,5vw,2.6rem);}
h1 .hl{color:var(--pink);}

/* tabs */
.tabs{display:flex;gap:10px;margin-bottom:24px;justify-content:center;}
.tab{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;color:var(--muted);
  background:var(--surface);box-shadow:var(--clay-sm);border:none;border-radius:var(--r-sm);
  padding:12px 24px;cursor:pointer;transition:all .15s;}
.tab.active{background:var(--ink);color:#fff;box-shadow:var(--clay-in);}

.pane{display:none;}.pane.active{display:block;}

/* week navigator */
.week-nav{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.week-nav .wlabel{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.3rem;
  min-width:100px;text-align:center;}
.arw{background:var(--surface);box-shadow:var(--clay-sm);border:none;border-radius:var(--r-sm);
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.2rem;color:var(--ink);
  padding:10px 18px;cursor:pointer;transition:transform .15s;}
.arw:hover{transform:translateY(-2px);}
.pub-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;
  border-radius:14px;font-weight:800;font-size:.82rem;}
.pub-badge.yes{background:#d6f0c2;color:#3a6b00;}
.pub-badge.no{background:var(--surface-2);box-shadow:var(--clay-sm);color:var(--muted);}

/* card + table */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);padding:22px 18px;margin-bottom:20px;}
.card h2{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.25rem;margin-bottom:16px;}
.card h2 .sub{font-size:.85rem;color:var(--muted);font-weight:700;}
.tscroll{overflow-x:auto;border-radius:var(--r-sm);}
table{border-collapse:separate;border-spacing:0 6px;width:100%;min-width:800px;}
th{font-family:'Nunito';font-weight:800;font-size:.72rem;text-transform:uppercase;
  letter-spacing:.4px;color:var(--muted);text-align:center;padding:4px 8px;}
th.left{text-align:left;}
td{background:var(--surface-2);padding:7px 8px;vertical-align:middle;text-align:center;}
td:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm);font-family:'Fredoka';
  font-weight:700;color:var(--lime-deep);}
td:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;}
td.left{text-align:left;}
td.tot{font-family:'Fredoka';font-weight:700;font-size:1.05rem;color:var(--ink);}

/* name input */
.name-inp{font-family:'Nunito';font-weight:700;font-size:.9rem;color:var(--ink);
  border:2px solid transparent;border-radius:9px;background:var(--surface);
  box-shadow:var(--clay-in);padding:8px 10px;width:160px;outline:none;transition:border-color .2s;}
.name-inp.saved{border-color:var(--lime);}
.name-inp.err{border-color:var(--pink);}

/* gender toggle */
.g-tog{display:flex;gap:5px;justify-content:center;}
.gbtn{font-family:'Nunito';font-weight:800;font-size:.8rem;border:none;cursor:pointer;
  border-radius:9px;padding:7px 10px;background:var(--surface-2);box-shadow:var(--clay-sm);
  color:var(--muted);transition:all .15s;}
.gbtn-m{background:#e1f0ff;color:#2266cc;box-shadow:var(--clay-in);}
.gbtn-f{background:#ffe1ef;color:var(--pink);box-shadow:var(--clay-in);}

/* numeric pts input */
td input.pts{width:60px;text-align:center;font-family:'Nunito';font-weight:700;font-size:.9rem;
  color:var(--ink);border:2px solid transparent;border-radius:9px;background:var(--surface);
  box-shadow:var(--clay-in);padding:7px 4px;outline:none;transition:border-color .2s;}
td input.pts.saved{border-color:var(--lime);}
td input.pts.err{border-color:var(--pink);}

/* gender badge (overall table, read-only) */
.gbadge{display:inline-block;font-size:.7rem;font-weight:800;padding:3px 8px;
  border-radius:8px;vertical-align:middle;}
.gbadge.F{background:#ffe1ef;color:var(--pink);}
.gbadge.M{background:#e1f0ff;color:#2266cc;}

/* remove button */
.rm-btn{border:none;cursor:pointer;background:#ffe1ef;color:var(--pink);font-weight:800;
  font-size:.75rem;border-radius:9px;padding:7px 10px;box-shadow:var(--clay-sm);white-space:nowrap;}
.rm-btn:hover{background:var(--pink);color:#fff;}

/* action row */
.act-row{display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap;}
.add-btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;color:var(--ink);
  border:none;cursor:pointer;border-radius:var(--r-sm);padding:12px 22px;
  background:var(--surface-2);box-shadow:var(--clay-sm);}
.add-btn:hover{transform:translateY(-2px);}
.pub-btn{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.1rem;color:#fff;
  padding:14px 28px;border:none;border-radius:var(--r-sm);cursor:pointer;
  background:linear-gradient(135deg,var(--lime),var(--lime-deep));box-shadow:var(--clay-sm);}
.pub-btn:hover{transform:translateY(-2px);}
.pub-btn:disabled{background:var(--surface-2);color:#a8b8aa;cursor:not-allowed;transform:none;}
.pub-note{color:var(--muted);font-size:.85rem;font-weight:700;}

/* overall sections */
.gender-section{margin-bottom:28px;}
.gender-head{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.2rem;
  margin-bottom:12px;padding-bottom:8px;border-bottom:3px solid var(--surface-2);}
.gender-head.girls{color:var(--pink);}
.gender-head.boys{color:var(--cyan);}
.rank-medal{color:#d4a017;}.rank-silver{color:#8a8a8a;}.rank-bronze{color:#b97b4a;}

/* delete confirmation modal */
.del-modal{position:fixed;inset:0;background:rgba(28,42,31,.6);backdrop-filter:blur(5px);
  z-index:90;display:none;align-items:center;justify-content:center;padding:20px;}
.del-modal.show{display:flex;}
.del-sheet{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);
  padding:28px 24px;max-width:450px;width:100%;}
.del-sheet h3{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:6px;}
.del-sheet .del-name{color:var(--muted);font-weight:700;margin-bottom:16px;font-size:.95rem;}
.del-sheet .del-hint{font-weight:700;font-size:.9rem;margin-bottom:10px;}
.del-sheet .del-hint .bee{font-family:'Fredoka',sans-serif;color:var(--pink);font-size:1.2rem;}
.bee-inp{width:100%;font-family:'Fredoka',sans-serif;font-size:1.5rem;text-align:center;
  letter-spacing:.1em;color:var(--ink);padding:14px;border:2px solid var(--surface-2);
  border-radius:var(--r-sm);background:var(--surface-2);box-shadow:var(--clay-in);
  outline:none;margin:4px 0 18px;}
.bee-inp.match{border-color:var(--pink);background:#fff0f5;}
.del-btns{display:flex;gap:12px;justify-content:flex-end;}
.del-cancel{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;color:var(--ink);
  background:var(--surface-2);box-shadow:var(--clay-sm);border:none;border-radius:var(--r-sm);
  padding:12px 20px;cursor:pointer;}
.del-confirm{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;color:#fff;
  background:var(--pink);border:none;border-radius:var(--r-sm);padding:12px 20px;cursor:pointer;
  box-shadow:var(--clay-sm);}
.del-confirm:disabled{background:var(--surface-2);color:#a8b8aa;cursor:not-allowed;}

.loading{text-align:center;color:var(--muted);font-weight:700;padding:40px;}
.empty-msg{color:var(--muted);font-weight:700;padding:22px;text-align:center;font-style:italic;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-weight:700;padding:12px 22px;border-radius:14px;
  box-shadow:var(--clay);opacity:0;pointer-events:none;transition:opacity .3s;z-index:60;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="./picklebee-logo.png" class="logo" alt="PickleBee by 71" onerror="this.style.display='none'">
    <div class="eyebrow">Season 2 — Admin</div>
    <h1>HIVE <span class="hl">Rankings</span></h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('week')">Week Points</button>
    <button class="tab" onclick="switchTab('overall')">Overall Rankings</button>
  </div>

  <!-- Pane 1: Week N Points -->
  <div class="pane active" id="paneWeek">
    <div class="week-nav">
      <button class="arw" onclick="changeWeek(-1)">&#8249;</button>
      <span class="wlabel" id="weekLabel">Week -</span>
      <button class="arw" onclick="changeWeek(+1)">&#8250;</button>
      <span class="pub-badge no" id="pubBadge">Not published</span>
    </div>
    <div id="weekContent"><div class="loading">Loading…</div></div>
  </div>

  <!-- Pane 2: Overall Rankings -->
  <div class="pane" id="paneOverall">
    <div id="overallContent"><div class="loading">Loading…</div></div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="del-modal" id="deleteModal">
  <div class="del-sheet">
    <h3>Remove Player</h3>
    <p class="del-name" id="deletePlayerName"></p>
    <p class="del-hint">Type <span class="bee">BeE</span> to confirm permanent deletion:</p>
    <input class="bee-inp" id="deleteConfirmInput" type="text" placeholder="BeE"
      autocomplete="off" oninput="checkDeleteConfirm()">
    <div class="del-btns">
      <button class="del-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="del-confirm" id="deleteConfirmBtn" disabled onclick="confirmDelete()">Delete Player</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PASTE YOUR APPS SCRIPT /exec URL HERE
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzeZaUXvfqsA1oVqwwnSxdn_JJrYnCJQ5-3vA0-TCJSjMZUP2tRMEl-PawqlxZ5opGbXg/exec";

const WEEK14_START = new Date(2026, 5, 13);
function getCurrentWeek(){
  return 14+Math.floor((Date.now()-WEEK14_START.getTime())/(7*24*3600*1000));
}

let currentWeek = getCurrentWeek();
let weekData = null;
const _debounce = {};
let _deleteIndex = null;

/* ======================== tabs ======================== */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['week','overall'][i]===tab));
  document.querySelectorAll('.pane').forEach((p,i)=>p.classList.toggle('active',['paneWeek','paneOverall'][i]==='pane'+cap(tab)));
  if(tab==='overall') loadOverall();
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(v){ return String(v==null?'':v).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ======================== week navigator ======================== */
function changeWeek(delta){ currentWeek=Math.max(14,currentWeek+delta); loadWeekPoints(); }

async function loadWeekPoints(){
  document.getElementById('weekLabel').textContent='Week '+currentWeek;
  document.getElementById('weekContent').innerHTML='<div class="loading">Loading…</div>';
  try{
    const res=await fetch(BACKEND_URL+'?action=weekpoints&week='+currentWeek);
    weekData=await res.json();
    renderWeekPublishedBadge();
    renderWeekTable();
  }catch(e){
    document.getElementById('weekContent').innerHTML='<div class="loading">Could not load. Check URL and retry.</div>';
  }
}

function renderWeekPublishedBadge(){
  const badge=document.getElementById('pubBadge');
  badge.className='pub-badge '+(weekData.published?'yes':'no');
  badge.textContent=weekData.published?'Published':'Not published';
}

/* ======================== week table ======================== */
function renderWeekTable(){
  const box=document.getElementById('weekContent');
  const hasRows=weekData.rows&&weekData.rows.length>0;
  const tableHtml=hasRows?buildWeekRows():'<div class="empty-msg">No points data for Week '+currentWeek+' yet. Points populate automatically as referees enter match scores.</div>';

  box.innerHTML=`
    <div class="card">
      <h2>Week ${currentWeek} — Individual Points <span class="sub">Auto-calculated from match results. All fields editable.</span></h2>
      ${hasRows?'<div class="tscroll"><table><thead><tr>'+
        '<th>Rank</th><th class="left">Name</th><th>Gender</th>'+
        '<th>Events</th><th>Singles Won</th><th>Doubles Won</th><th>Bonus</th><th>Total</th><th></th>'+
        '</tr></thead><tbody>'+tableHtml+'</tbody></table></div>':tableHtml}
      <div class="act-row">
        <button class="add-btn" onclick="addPlayer()">+ Add Player</button>
        <button class="pub-btn" id="pubBtn" onclick="publishWeek()">
          ${weekData.published?'Re-publish Week '+currentWeek:'Publish Week '+currentWeek}</button>
        <span class="pub-note">${weekData.published?'Already published — re-publishing updates overall totals.':'Adds this week\'s points to the overall leaderboard.'}</span>
      </div>
    </div>`;
}

function buildWeekRows(){
  return weekData.rows.map(r=>{
    const hasData=String(r.name||'').trim()!=='';
    return `<tr>
      <td>${r.rank||'-'}</td>
      <td class="left">${nameInput(r)}</td>
      <td>${genderToggle(r)}</td>
      <td>${ptsInput(r,'eventsPlayed')}</td>
      <td>${ptsInput(r,'singlesWon')}</td>
      <td>${ptsInput(r,'doublesWon')}</td>
      <td>${ptsInput(r,'bonusPoints')}</td>
      <td class="tot" id="tot-${r.index}">${r.totalPoints}</td>
      <td>${hasData?`<button class="rm-btn" onclick="openDeleteModal(${r.index},'${esc(r.name)}')">Remove</button>`:''}</td>
    </tr>`;
  }).join('');
}

function nameInput(r){
  return `<input type="text" class="name-inp" value="${esc(r.name||'')}" placeholder="Player name"
    id="name-${r.index}"
    onchange="saveWeekCell(this,${r.index},'name')"
    onfocus="checkPublishedEdit(event,this)">`;
}

function genderToggle(r){
  const m=r.gender==='M', f=r.gender==='F';
  return `<div class="g-tog">
    <button class="gbtn ${m?'gbtn-m':''}" onclick="setGender(this,${r.index},'M')">M</button>
    <button class="gbtn ${f?'gbtn-f':''}" onclick="setGender(this,${r.index},'F')">F</button>
  </div>`;
}

function ptsInput(r,field){
  return `<input class="pts" type="number" min="0" value="${r[field]}"
    onchange="saveWeekCell(this,${r.index},'${field}')"
    onfocus="checkPublishedEdit(event,this)">`;
}

/* ======================== edit handlers ======================== */
function checkPublishedEdit(event,el){
  if(weekData&&weekData.published){
    el.blur();
    if(!confirm('You are about to edit published data! Do you still want to proceed?'))
      { event.preventDefault(); return; }
    el.focus();
  }
}

// Debounced save for text + numeric inputs
function saveWeekCell(el,index,field){
  const k=`${index}_${field}`;
  clearTimeout(_debounce[k]);
  _debounce[k]=setTimeout(()=>_doSaveWeekCell(el,index,field),400);
}

async function _doSaveWeekCell(el,index,field){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'updateWeekPoints',week:currentWeek,index:index,field:field,value:el.value})});
    const out=await res.json();
    if(out.ok){
      el.classList.add('saved'); setTimeout(()=>el.classList.remove('saved'),1000);
      // Update total only for numeric fields (newTotal is null for name/gender)
      if(out.newTotal!==null&&out.newTotal!==undefined){
        const totEl=document.getElementById('tot-'+index); if(totEl) totEl.textContent=out.newTotal;
      }
      // If name changed, update the remove button visibility
      if(field==='name') loadWeekPoints();
      else toast('Saved');
    }else{ el.classList.add('err'); setTimeout(()=>el.classList.remove('err'),1500); toast(out.error||'Save failed'); }
  }catch(e){ el.classList.add('err'); setTimeout(()=>el.classList.remove('err'),1500); toast('Network error'); }
}

// Immediate save for gender toggle buttons
async function setGender(btn,index,gender){
  if(weekData&&weekData.published){
    if(!confirm('You are about to edit published data! Do you still want to proceed?')) return;
  }
  // Visual update immediately
  const tog=btn.parentElement;
  tog.querySelectorAll('.gbtn').forEach(b=>{ b.classList.remove('gbtn-m','gbtn-f'); });
  btn.classList.add(gender==='M'?'gbtn-m':'gbtn-f');
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'updateWeekPoints',week:currentWeek,index:index,field:'gender',value:gender})});
    const out=await res.json();
    if(out.ok) toast('Saved'); else toast(out.error||'Save failed');
  }catch(e){ toast('Network error'); }
}

/* ======================== add / remove player ======================== */
async function addPlayer(){
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'addWeekPlayer',week:currentWeek})});
    const out=await res.json();
    if(out.ok){ toast('Player row added'); await loadWeekPoints(); }
    else toast(out.error||'Could not add player');
  }catch(e){ toast('Network error'); }
}

function openDeleteModal(index,name){
  _deleteIndex=index;
  document.getElementById('deletePlayerName').textContent='Removing: '+name;
  document.getElementById('deleteConfirmInput').value='';
  document.getElementById('deleteConfirmInput').classList.remove('match');
  document.getElementById('deleteConfirmBtn').disabled=true;
  document.getElementById('deleteModal').classList.add('show');
  setTimeout(()=>document.getElementById('deleteConfirmInput').focus(),100);
}
function closeDeleteModal(){
  document.getElementById('deleteModal').classList.remove('show');
  _deleteIndex=null;
}
function checkDeleteConfirm(){
  const val=document.getElementById('deleteConfirmInput').value;
  const match=val==='BeE';
  document.getElementById('deleteConfirmInput').classList.toggle('match',match);
  document.getElementById('deleteConfirmBtn').disabled=!match;
}
async function confirmDelete(){
  if(_deleteIndex===null) return;
  const idx=_deleteIndex; closeDeleteModal();
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({
      action:'removeWeekPlayer',week:currentWeek,index:idx})});
    const out=await res.json();
    if(out.ok){ toast('Player removed'); await loadWeekPoints(); }
    else toast(out.error||'Could not remove player');
  }catch(e){ toast('Network error'); }
}

/* ======================== publish ======================== */
async function publishWeek(){
  const alreadyPublished=weekData&&weekData.published;
  const msg=alreadyPublished
    ?'Re-publish Week '+currentWeek+'? Overall totals will update with your latest edits.'
    :'Publish Week '+currentWeek+' to the overall leaderboard? This adds all points from this week to the season totals.';
  if(!confirm(msg)) return;
  const btn=document.getElementById('pubBtn'); if(btn){ btn.disabled=true; btn.textContent='Publishing…'; }
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify({action:'publishWeek',week:currentWeek})});
    const out=await res.json();
    if(out.ok){ weekData.published=true; renderWeekPublishedBadge(); renderWeekTable(); toast('Week '+currentWeek+' published'); }
    else{ toast(out.error||'Could not publish'); if(btn){btn.disabled=false;btn.textContent='Publish Week '+currentWeek;} }
  }catch(e){ toast('Network error'); if(btn){btn.disabled=false;btn.textContent='Publish Week '+currentWeek;} }
}

/* ======================== overall ======================== */
async function loadOverall(){
  document.getElementById('overallContent').innerHTML='<div class="loading">Loading…</div>';
  try{
    const res=await fetch(BACKEND_URL+'?action=overallpoints');
    renderOverall(await res.json());
  }catch(e){ document.getElementById('overallContent').innerHTML='<div class="loading">Could not load rankings.</div>'; }
}

function renderOverall(data){
  if(!data||(data.girls.length===0&&data.boys.length===0)){
    document.getElementById('overallContent').innerHTML=
      '<div class="card"><div class="empty-msg">Overall rankings appear once the first week is published.</div></div>';
    return;
  }
  const mc=rank=>rank===1?'rank-medal':rank===2?'rank-silver':rank===3?'rank-bronze':'';
  const rows=players=>players.map(p=>`<tr>
    <td class="${mc(p.rank)}">${p.rank}</td>
    <td class="left">${p.name}</td>
    <td><span class="gbadge ${p.gender}">${p.gender}</span></td>
    <td>${p.eventsPlayed}</td><td>${p.singlesWon}</td><td>${p.doublesWon}</td>
    <td>${p.bonusPoints}</td><td class="tot">${p.totalPoints}</td>
  </tr>`).join('');
  const head=`<thead><tr><th>Rank</th><th class="left">Name</th><th>Gender</th>
    <th>Events</th><th>Singles Won</th><th>Doubles Won</th><th>Bonus</th><th>Total Points</th></tr></thead>`;
  document.getElementById('overallContent').innerHTML=`
    <div class="card gender-section">
      <h2 class="gender-head girls">Girls - Top 12</h2>
      ${data.girls.length?'<div class="tscroll"><table>'+head+'<tbody>'+rows(data.girls)+'</tbody></table></div>':'<div class="empty-msg">No girls rankings yet.</div>'}
    </div>
    <div class="card gender-section">
      <h2 class="gender-head boys">Boys - Top 36</h2>
      ${data.boys.length?'<div class="tscroll"><table>'+head+'<tbody>'+rows(data.boys)+'</tbody></table></div>':'<div class="empty-msg">No boys rankings yet.</div>'}
    </div>`;
}

/* ======================== toast ======================== */
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2000); }

loadWeekPoints();
</script>
</body>
